services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projeto-seguranca-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/login_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: 123321ABC
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: projeto-seguranca-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 123321ABC
      POSTGRES_DB: login_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d login_db"]
      interval: 10s
      timeout: 5s
      retries: 5
